# CRM nginx 配置
# 同机部署:Nginx 暴露 80,后端 Go 监听 15373 仅 127.0.0.1 / 内网,前端静态资源直接由 Nginx 出。
#
# 用法:
#   1. 拷贝到部署机 nginx 目录(路径按 OS 调整):
#        macOS (Homebrew):   cp nginx.conf /usr/local/etc/nginx/servers/default.conf
#        Linux (apt):        cp nginx.conf /etc/nginx/conf.d/default.conf
#   2. 改 root 路径为部署机实际产物目录(默认写的是本机开发路径)
#   3. nginx -t && nginx -s reload
#
# 注意:
#   - 服务端必须保留 ListenAddr = ":15373"(绑 0.0.0.0),否则 127.0.0.1 上游会连不上。
#   - 前端 BACKEND_ORIGIN 已改为 http://127.0.0.1:15373(vite.config.ts),dev/prod 都走 loopback。
#   - 长耗时接口:openclaw exec 最多跑 2 分钟,前端轮询 /api/wechat/bind/:task_id,默认 60s
#     proxy_read_timeout 会切断连接,统一提到 300s。

# ---- 上游:Go 后端 ----
# keepalive 32 应对前端高频轮询 /api/wechat/bind/:task_id 时的连接复用
upstream crm_backend {
    server 127.0.0.1:15373;
    keepalive 32;
}

server {
    # 监听端口:按需改(SSL 在外面套一层,这里只演示 HTTP)
    listen 8000;
    server_name _;

    # 静态资源根目录(vite build 产物,生产部署改这里)
    root /var/web/dist;
    index index.html;

    # ---- 通用调优 ----
    # 客户端上传大小限制(FAQ / Moonstar PDF 上传走 /api/uploads/*)
    client_max_body_size 20m;

    # 长耗时接口兜底:openclaw exec 2min + 前端轮询间隔
    proxy_connect_timeout 5s;
    proxy_send_timeout    300s;
    proxy_read_timeout    300s;
    send_timeout          300s;

    # 通用代理头
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   Connection        "";

    # ---- 后端 API ----
    # proxy_pass 走 upstream(无尾斜杠),原 URI 透传:/api/foo -> backend /api/foo
    location /api/ {
        proxy_pass http://crm_backend;
    }

    # ---- gzip ----
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/xml
        image/svg+xml;

    # ---- 静态资源(hash 文件名,可永久缓存) ----
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ---- SPA 兜底 ----
    # React Router history 模式:非 /api/ 非 /assets/ 全部回 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---- index.html 不缓存(发布新版本用户必须拿到新入口) ----
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires -1;
    }
}
